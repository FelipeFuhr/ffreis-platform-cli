remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: b6a9ef92199954e3da5b80814321cb92f649fb81
    configs:
      - lefthook/base.yml
      - lefthook/go.yml
pre-commit:
  commands:
    # Override remote: only run lint when Go source files are staged
    lint:
      glob: "{**/*.go,go.mod,go.sum}"
      run: make lint

pre-push:
  parallel: false
  commands:
    integration-tests:
      run: make test-integration
    quality-gates:
      run: make quality-gates
    generated-drift:
      run: make hook-generated-drift
