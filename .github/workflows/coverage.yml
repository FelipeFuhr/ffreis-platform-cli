name: Code Coverage (Codecov)

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-coverage.yml@2dc66b62be7f8685244fed807fcb160c7ba7af24
    with:
      go-version: "1.25.9"
      working-directory: "."
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
