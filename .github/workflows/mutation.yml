name: Mutation Testing

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mutation.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      packages: "./pkg/..."
      threshold: 60